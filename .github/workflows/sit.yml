name: Run the System Integration Tests in a ephemeral environment

on:
  workflow_dispatch:
    inputs:
      environment:
        type: environment
        required: false
        default: test  
      
jobs:
  provision-infra:
    name: Manage resources
    uses: keeonline/reference-infra-aws/.github/workflows/reusable-manage-infra.yml@bob
    permissions:
      id-token: write
    secrets:
      inherit
    with:
      action: apply-plan
      environment: ${{ vars.INFRA_ENVIRONMENT }}
      repo_name: keeonline/reference-infra-aws
      repo_ref: v0.0.56

